<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Eye Shape -->
  <path d="M20 100C20 100 60 40 100 40C140 40 180 100 180 100C180 100 140 160 100 160C60 160 20 100 20 100Z" stroke="#9333EA" stroke-width="2" fill="#1E1B4B" fill-opacity="0.3"/>
  
  <!-- Iris Glow -->
  <circle cx="100" cy="100" r="40" fill="url(#iris_gradient)"/>
  
  <!-- Geometric Circles -->
  <circle cx="100" cy="100" r="30" stroke="#C084FC" stroke-width="0.5" stroke-dasharray="2 4"/>
  <circle cx="100" cy="100" r="50" stroke="#7E22CE" stroke-width="0.5" stroke-dasharray="4 8"/>
  
  <!-- Slit Pupil -->
  <path d="M100 70C102 80 102 120 100 130C98 120 98 80 100 70Z" fill="#F3E8FF">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite" />
  </path>
  
  <!-- Decorative Points -->
  <circle cx="100" cy="40" r="2" fill="#D8B4FE"/>
  <circle cx="100" cy="160" r="2" fill="#D8B4FE"/>
  <circle cx="20" cy="100" r="2" fill="#D8B4FE"/>
  <circle cx="180" cy="100" r="2" fill="#D8B4FE"/>

  <defs>
    <radialGradient id="iris_gradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(100 100) rotate(90) scale(40)">
      <stop stop-color="#A855F7" stop-opacity="0.6"/>
      <stop offset="0.8" stop-color="#6B21A8" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#581C87" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
